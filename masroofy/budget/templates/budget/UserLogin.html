<!DOCTYPE html>
<html>
<head>
    <title>Set Budget</title>

    <style>
    body {
        font-family: Arial;
        background-color: #f5f5f5;
        padding: 30px;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
        width: 100%;
        padding: 8px;
    }

    button {
        padding: 10px;
        width: 100%;
        background-color: green;
        color: white;
        border: none;
        border-radius: 5px;
    }
    </style>

</head>
<body>

    <h1>Login</h1>

    <div class="card">

        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}

        {% if success %}
            <p style="color:green;">Login successfully</p>
        {% endif %}

    
        <form method="POST">
            {% csrf_token %}

            <label>name:</label>
            <input type="text" name="Name"><br><br>

            <label>Password :</label>
            <input type="text" name="Password"><br><br>

            <button type="submit">Save</button>
        </form>

    </div>

</body>
</html>
